services:
  db:
    image: postgres:18.3-alpine
    container_name: hotel-db
    restart: always
    env_file:
      - .env
    ports:
      - "5437:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - app-network

  app:
    build: .
    container_name: hotel
    ports:
      - "8082:8080"
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge